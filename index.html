    function renderPosts(filter = 'all') {
        const container = document.getElementById('posts-container');
        container.innerHTML = '';
        
        const filteredPosts = filter === 'all' 
            ? posts 
            : posts.filter(post => post.category === filter);

        filteredPosts.forEach(post => {
            const card = document.createElement('a');
            card.className = 'post-card';
            card.href = post.url;
            card.innerHTML = `
                <img src="${post.image}" alt="${post.title}">
                <div class="post-card-content">
                    <small>${post.category} · ${post.date}</small>
                    <h3>${post.title}</h3>
                    <p>${post.summary}</p>
                </div>
            `;
            container.appendChild(card);
        });

        // Update counts
        updateCounts();
    }

    function updateCounts() {
        const counts = {
            'count-all': posts.length,
            'count-news': posts.filter(p => p.category === 'AI 최신뉴스').length,
            'count-dev': posts.filter(p => p.category === 'AI를 활용한 개발정보').length,
            'count-openclaw': posts.filter(p => p.category === 'OpenClaw').length,
            'count-money': posts.filter(p => p.category === '수익화 팁').length
        };
        for (const [id, count] of Object.entries(counts)) {
            const el = document.getElementById(id);
            if (el) {
                el.innerText = count;
                el.style.display = 'inline-block'; // 강제 표시
            }
        }
    }

    function filterCategory(category, event) {
        event.preventDefault();
        document.querySelectorAll('.category-pill').forEach(pill => pill.classList.remove('active'));
        event.target.closest('.category-pill').classList.add('active');
        renderPosts(category);
    }

    renderPosts();
</script>
